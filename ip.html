<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body onLoad="typeWriter()">
    <p id="demo"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <script>
        var b = 0;
        var txt2 = 'I guess you must have questions, huh?'
        var speed = 60;

        function typeWriter2() {
            if (b < txt2.length) {
                document.getElementById("demo2").innerHTML += txt2.charAt(b);
                b++
                setTimeout(typeWriter2, speed);
            }
        }
    </script>
    <script>
        var i = 0;
        var txt = 'How did you find this? I thought we hid everything pretty well...';
        var speed = 70;
        
        function typeWriter() {
          if (i < txt.length) {
            document.getElementById("demo").innerHTML += txt.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
          }
        }
    </script>
    <script>
        function dissappear() {
            typeWriter2()
            button2.style.display='none'
            button3.style.display='initial'
        }
    </script>
    <script>
        function buttonslol() {
            typeWriter3()
            button3.style.display='none'
            button4.style.display='initial'
        }
    </script>
    <script>
        var p = 0;
        var txt3 = "I'll send you to the subject info, that should answer any questions you have.";
        var speed = 70;
        
        function typeWriter3() {
            if (p < txt3.length) {
                document.getElementById("demo3").innerHTML += txt3.charAt(p);
                p++;
                setTimeout(typeWriter3, speed);
            }
        }
    </script>
    <button id="button2" onClick=dissappear()>Continue</button>
    <button id="button3" onClick=buttonslol()>Continue</button>
    <button id="button4" onClick="location.href = 'subject.html'">Continue</button>
</body>
