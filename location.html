<!DOCTYPE html>

<head>
    <script src="http://maps.google.com/maps?file=api&amp;v=2&amp;sensor=false" type="text/javascript"></script>
    <link rel="stylesheet" href="style.css">
</head>



<h1>I am in your closet.</h1>
<body onunload="GUnload()">
    
    <iframe
    id="map" 
    width="500" 
    height="600" 
    frameborder="0" 
    scrolling="no" 
    marginheight="0" 
    marginwidth="0" 
    src="">
    </iframe>

    <script type="text/javascript">
        let y = "https://maps.google.com/maps?q=latitude,longitude&hl=us&z=14&output=embed";

        navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        y = y.replace("latitude", lat).replace("longitude", lon);
        document.getElementById("map").src = y;
    });
    </script>
</body>
